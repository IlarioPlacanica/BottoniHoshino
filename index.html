<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bottoni Hoshino</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="scene" aria-label="Scena principale">
      <img
        id="background-image"
        class="scene-media scene-image"
        src="Assets/img/Background.png"
        alt=""
      >

      <canvas
        id="scene-canvas"
        class="scene-media scene-canvas"
        width="1200"
        height="2670"
        aria-hidden="true"
      ></canvas>

      <video
        class="source-video"
        data-button="left"
        playsinline
        preload="auto"
      >
        <source src="Assets/video/ButtonLeft.mp4" type="video/mp4">
        Il tuo browser non supporta il video.
      </video>

      <video
        class="source-video"
        data-button="center"
        playsinline
        preload="auto"
      >
        <source src="Assets/video/ButtonCenter.mp4" type="video/mp4">
        Il tuo browser non supporta il video.
      </video>

      <video
        class="source-video"
        data-button="right"
        playsinline
        preload="auto"
      >
        <source src="Assets/video/ButtonRight.mp4" type="video/mp4">
        Il tuo browser non supporta il video.
      </video>

      <section class="hero-copy" aria-label="Testo principale">
        <h1>
          CIAO PUTI
          <br>
          CLICCA SUI BOTTONI
          <br>
          PER VEDERE LE ANIMAZIONI
        </h1>
      </section>

      <button
        class="hotspot hotspot-left"
        data-button="left"
        type="button"
        aria-label="Riproduci animazione ButtonLeft"
      ></button>

      <button
        class="hotspot hotspot-center"
        data-button="center"
        type="button"
        aria-label="Riproduci animazione ButtonCenter"
      ></button>

      <button
        class="hotspot hotspot-right"
        data-button="right"
        type="button"
        aria-label="Riproduci animazione ButtonRight"
      ></button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
